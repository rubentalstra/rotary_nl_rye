name: PR checks

on:
  pull_request:
    branches:
      - main

defaults:
  tools:
    node: "22.13.0"
    pnpm: "11.2.2"

jobs:
  checks:
    name: Lint + typecheck + expo-doctor
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules

      - name: TypeScript
        run: pnpm exec tsc --noEmit

      - name: ESLint
        run: pnpm exec expo lint

      - name: Expo Doctor
        run: pnpm dlx expo-doctor

  comment_on_pr:
    name: Post checks summary to PR
    needs: [checks]
    if: ${{ always() }}
    type: github-comment
    params:
      body: |
        ## EAS PR checks
        - Status: **${{ needs.checks.status }}**
        - Run: ${{ github.run_id }}
