name: CI

on:
  push:
    branches: [main]
    paths:
      - "rotary-yep-nl/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "rotary-yep-nl/**"
      - ".github/workflows/ci.yml"

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "11.2.2"
  WORKING_DIR: ./rotary-yep-nl

jobs:
  # ─────────────────────────────────────────────────────────────
  # Install dependencies (shared across jobs via cache)
  # ─────────────────────────────────────────────────────────────
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "rotary-yep-nl/pnpm-lock.yaml"

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: rotary-yep-nl/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('rotary-yep-nl/pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        working-directory: ${{ env.WORKING_DIR }}
        run: pnpm install --frozen-lockfile

  # ─────────────────────────────────────────────────────────────
  # TypeScript type checking
  # ─────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "rotary-yep-nl/pnpm-lock.yaml"

      - name: Restore node_modules cache
        uses: actions/cache@v5
        with:
          path: rotary-yep-nl/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('rotary-yep-nl/pnpm-lock.yaml') }}

      - name: Run TypeScript compiler
        working-directory: ${{ env.WORKING_DIR }}
        run: pnpm exec tsc --noEmit

  # ─────────────────────────────────────────────────────────────
  # ESLint with SARIF output for GitHub code scanning
  # ─────────────────────────────────────────────────────────────
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    needs: install
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "rotary-yep-nl/pnpm-lock.yaml"

      - name: Restore node_modules cache
        uses: actions/cache@v5
        with:
          path: rotary-yep-nl/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('rotary-yep-nl/pnpm-lock.yaml') }}

      - name: Run ESLint (SARIF output)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          pnpm exec eslint . \
            --format @microsoft/eslint-formatter-sarif \
            --output-file eslint-results.sarif \
            || true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: rotary-yep-nl/eslint-results.sarif
          category: eslint

      - name: Run ESLint (console output)
        working-directory: ${{ env.WORKING_DIR }}
        run: pnpm exec expo lint

  # ─────────────────────────────────────────────────────────────
  # Expo Doctor - check for common issues
  # ─────────────────────────────────────────────────────────────
  expo-doctor:
    name: Expo Doctor
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "rotary-yep-nl/pnpm-lock.yaml"

      - name: Restore node_modules cache
        uses: actions/cache@v5
        with:
          path: rotary-yep-nl/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('rotary-yep-nl/pnpm-lock.yaml') }}

      - name: Run Expo Prebuild
        working-directory: ${{ env.WORKING_DIR }}
        run: pnpm exec expo prebuild

      - name: Run Expo Doctor
        working-directory: ${{ env.WORKING_DIR }}
        # Allow to continue - we commit native folders intentionally
        continue-on-error: true
        run: pnpm dlx expo-doctor

  # ─────────────────────────────────────────────────────────────
  # Summary job - ensures all checks pass
  # ─────────────────────────────────────────────────────────────
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [typecheck, eslint, expo-doctor]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.eslint.result }}" != "success" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI checks passed!"
